{% extends "layout.html" %}

{% block body %}

<h2>Add Product</h2>
<form method="POST">
    <input type="text" name="productname" placeholder="Product Name"  class="form-control" required><br>
    <input type="number" name="quantity" placeholder="Quantity" class="form-control" required><br>
    <input type="number" step="0.01" name="price" placeholder="Price" class="form-control" required><br>
    <button type="submit" class="btn btn-success" >Add Product</button>


</form>






{%endblock %}
