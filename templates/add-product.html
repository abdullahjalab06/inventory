{% extends "layout.html" %}

{% block body %}

<h2>اضافة منتج</h2>
<form method="POST">
    <input type="text" name="productname" placeholder="اسم المنتج"  class="form-control" required><br>
    <input type="number" name="quantity" placeholder="الكمية" class="form-control" required><br>
    <input type="number" step="0.01" name="price" placeholder="السعر" class="form-control" required><br>
    <button type="submit" class="btn btn-success" >اضافة منتج</button>


</form>






{%endblock %}
