{% extends "layout.html" %}

{% block body %}

<h1>Update Quantity</h1>


<table class="table table-bordered table-hover">

    <tr>
        <th>اسم المنتج</th>
        <th>الكمية الحالية</th>
        <th>الكمية الجديدة</th>
    </tr>

    {% for product in products %}

    <tr>

        <td>{{ product.productname }}</td>

        <td>{{ product.quantity }}</td>

        <td>

            <form action="/add_new_stock/{{ product.id }}"
                  method="POST">

                <input type="number"
                          name="quantity"
                          class="form-control"
                          required>

                <<button type="submit" class="btn btn-success">
                    تحديث الكمية
                </button>
                
            </form>
                <form action="/sell_product/{{ product.id }}" method="POST">

        <input type="number"
               name="amount"
               class="form-control"
               placeholder="كمية البيع"
               required>

        <button type="submit" class="btn btn-danger">
            بيع المنتج
        </button>

        </form>
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
